<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小贷财务系统</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
    }
    .login-card {
      width: min(520px, 100%);
      background: #ffffff;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    .login-card h1 {
      margin: 0 0 10px;
      font-size: 26px;
      color: #0f172a;
    }
    .login-card .hint {
      margin-bottom: 18px;
      color: #475569;
    }
    .login-card label {
      display: block;
      margin-bottom: 16px;
      font-size: 14px;
      color: #334155;
    }
    .login-card input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-top: 8px;
    }
    .login-card button {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    .login-card button:hover {
      background: #1d4ed8;
    }
    .login-divider {
      text-align: center;
      margin: 18px 0;
      color: #64748b;
      font-size: 13px;
    }
    .login-card textarea {
      width: 100%;
      min-height: 90px;
      margin-top: 8px;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      resize: vertical;
      font-size: 13px;
      color: #0f172a;
      background: #f8fafc;
    }
    .link-note {
      margin-top: 12px;
      color: #475569;
      font-size: 13px;
    }
    .links-list {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .link-card {
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 13px;
      color: #0f172a;
    }
    .link-card div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .link-card button {
      background: #ef4444;
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }
    .link-card button:hover {
      background: #dc2626;
    }
    .login-message {
      margin-top: 14px;
      color: #dc2626;
      font-size: 13px;
      min-height: 20px;
    }
    .app {
      max-width: 1440px;
      margin: 24px auto;
      padding: 20px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: 16px;
      padding: 18px 14px;
      flex-shrink: 0;
    }
    .sidebar h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .nav-item {
      display: block;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.06);
    }
    .nav-item.active {
      background: #2563eb;
      color: #fff;
      font-weight: 700;
    }
    .main {
      flex: 1;
      min-width: 0;
    }
    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 26px;
      color: #0f172a;
    }
    .hint {
      color: #64748b;
      margin: 0;
      font-size: 14px;
    }
    .mini-pill {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      color: #047857;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    form {
      background: #f9fafb;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
    }
    label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
      gap: 6px;
      font-weight: 600;
    }
    input {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }
    select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 14px;
      border-radius: 12px;
    }
    .filter-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      margin-top: 0;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .secondary {
      background: #6b7280;
    }
    .secondary:hover {
      background: #4b5563;
    }
    .success {
      background: #0f766e;
    }
    .success:hover {
      background: #115e59;
    }
    .danger {
      background: #dc2626;
    }
    .danger:hover {
      background: #b91c1c;
    }
    .summary {
      margin-bottom: 10px;
      color: #374151;
      font-weight: 600;
    }
    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: #475569;
      font-size: 14px;
    }
    .stats div {
      background: #eff6ff;
      padding: 8px 12px;
      border-radius: 8px;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-badge.done {
      background: #dcfce7;
      color: #166534;
    }
    .status-badge.pending {
      background: #fef3c7;
      color: #92400e;
    }
    .reports {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .report-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
    .report-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #1d4ed8;
    }
    .report-card ul {
      margin: 0;
      padding-left: 18px;
      color: #475569;
      font-size: 13px;
    }
    .report-card li {
      margin-bottom: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 13px;
    }
    th {
      background: #eff6ff;
      color: #1d4ed8;
    }
    .action-cell {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .edit-btn {
      margin-top: 0;
      padding: 6px 10px;
      background: #f59e0b;
    }
    .edit-btn:hover {
      background: #d97706;
    }
    .delete-btn {
      margin-top: 0;
      padding: 6px 10px;
      background: #ef4444;
    }
    .delete-btn:hover {
      background: #dc2626;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .toolbar {
        align-items: stretch;
      }
      .filter-group, .actions {
        width: 100%;
      }
    }
    .ledger-container {
      padding: 0;
    }
    .ledger-summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .ledger-summary .summary-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 24px;
      min-width: 160px;
    }
    .ledger-summary .summary-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .ledger-summary .summary-value {
      font-size: 22px;
      font-weight: 700;
    }
    .ledger-summary .summary-value.income { color: #16a34a; }
    .ledger-summary .summary-value.expense { color: #dc2626; }
    .ledger-summary .summary-value.balance { color: #2563eb; }
    .ledger-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .ledger-card-header {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
    }
    .ledger-card-header span {
      font-size: 14px;
      font-weight: 600;
      margin-left: 8px;
    }
    .ledger-card-header span.income { color: #16a34a; }
    .ledger-card-header span.expense { color: #dc2626; }
    .ledger-section {
      margin-top: 12px;
    }
    .ledger-section-title {
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 8px;
    }
    .ledger-sub-section {
      margin-left: 16px;
      margin-top: 8px;
    }
    .ledger-sub-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
    }
    .ledger-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      background: #f8fafc;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .ledger-item-label {
      color: #334155;
    }
    .ledger-item-value {
      font-weight: 600;
    }
    .ledger-item-value.income { color: #16a34a; }
    .ledger-item-value.expense { color: #dc2626; }
  </style>
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h1>财务系统登录</h1>
      <p class="hint">其他财务人员可通过生成的链接直接登录并登记记录。</p>
      <form id="loginForm">
        <label>
          姓名
          <input type="text" id="loginName" placeholder="请输入姓名" required />
        </label>
        <button type="submit">直接登录</button>
      </form>
      <div class="login-divider">或</div>
      <form id="generateLinkForm">
        <label>
          登录名称
          <input type="text" id="linkName" placeholder="生成登录链接使用的姓名" required />
        </label>
        <button type="submit">生成登录链接</button>
      </form>
      <textarea id="shareLinkOutput" readonly placeholder="生成后这里会显示可分享的链接"></textarea>
      <div class="link-note">将链接复制给其他财务人员，打开该链接即可直接登录。</div>
      <div class="login-message" id="loginMessage"></div>
      <div class="links-list" id="linksList"></div>
    </div>
  </div>
  <div class="app" style="display:none">
    <div class="sidebar">
      <h2>财务台账</h2>
      <div class="nav-item active" data-page="entry">记账录入</div>
      <div class="nav-item" data-page="ledger">台账明细</div>
      <div class="nav-item" data-page="reconcile">对账管理</div>
    </div>
    <div class="main">
      <div class="page-head">
      <div>
        <h1>MORODOK 财务系统</h1>
        <p class="hint">记录公户转账银行卡号码、卡转卡记录、MORODOK名称、用途、收支用途、金额、备注和对账状态。</p>
      </div>
      <div class="mini-pill">当前用户：<span id="userNameDisplay">未登录</span></div>
      <button type="button" id="logoutBtn" class="secondary" style="display:none;">退出登录</button>
    </div>

    <div id="entryPage" class="page" style="display:block;">
    <form id="recordForm">
      <div class="grid">
        <label>
          转账银行卡号码
          <input type="text" name="bankCard" placeholder="请输入银行卡号码" required />
        </label>
        <label>
          卡名称
          <input type="text" name="cardName" placeholder="例如：公户卡" required />
        </label>
        <label>
          转入银行卡卡号
          <input type="text" name="toCardNumber" placeholder="转入的银行卡号" required />
        </label>
        <label>
          卡收款人名称
          <input type="text" name="toCardName" placeholder="转入卡的收款人" required />
        </label>
        <label>
          卡用途
          <input type="text" name="cardUse" placeholder="例如：日常周转" required />
        </label>
        <label>
          业务板块
          <select name="businessType" required>
            <option value="主卡">主卡（资金来源）</option>
            <option value="小贷业务">小贷业务</option>
            <option value="汽车业务">汽车业务</option>
            <option value="手机分期">手机分期</option>
          </select>
        </label>
        <label id="toBusinessLabel" style="display:none;">
          转入业务板块
          <select name="toBusinessType" id="toBusinessType">
            <option value="">选择转入板块</option>
            <option value="小贷业务">小贷业务</option>
            <option value="汽车业务">汽车业务</option>
            <option value="手机分期">手机分期</option>
          </select>
        </label>
        <label>
          收支用途
          <input type="text" name="expenseUse" list="expenseUseList" placeholder="选择或输入" required />
          <datalist id="expenseUseList">
            <option value="银行放款">
            <option value="投资款">
            <option value="伙食费">
            <option value="房租">
            <option value="水电">
            <option value="招待费">
            <option value="办公用品">
            <option value="固定资产">
            <option value="其它费用">
          </datalist>
        </label>
        <label>
          收支类型
          <select name="type" required>
            <option value="收入">收入</option>
            <option value="支出">支出</option>
          </select>
        </label>
        <label style="flex-direction: row; align-items: center; gap: 10px;">
          金额
          <input type="number" name="amount" step="0.01" min="0" placeholder="请输入金额" style="flex: 1;" required />
          <select id="formCurrencySelect" style="width: 120px;">
            <option value="CNY" selected>¥ 人民币</option>
            <option value="USD">$ 美元</option>
          </select>
        </label>
        <label>
          备注
          <input type="text" name="remark" placeholder="请输入备注" />
        </label>
        <label>
          对账状态
          <select name="status">
            <option value="未对账">未对账</option>
            <option value="已对账">已对账</option>
          </select>
        </label>
        <label>
          日期
          <input type="date" name="date" required />
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" id="submitBtn">新增记录</button>
        <button type="button" id="cancelEditBtn" class="secondary" style="display:none;">取消修改</button>
      </div>
    </form>

    <div class="toolbar">
      <div class="filter-group">
        <label>
          开始日期
          <input type="date" id="startDate" />
        </label>
        <label>
          结束日期
          <input type="date" id="endDate" />
        </label>
        <label>
          卡名称
          <input type="text" id="cardNameFilter" placeholder="请输入卡名称" />
        </label>
        <label>
          对账状态
          <select id="statusFilter">
            <option value="">全部</option>
            <option value="未对账">未对账</option>
            <option value="已对账">已对账</option>
          </select>
        </label>
        <label>
          货币单位
          <select id="currencySelect">
            <option value="CNY" selected>人民币 (¥)</option>
            <option value="USD">美元 ($)</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <button type="button" id="filterBtn">筛选</button>
        <button type="button" id="resetBtn" class="secondary">重置</button>
        <button type="button" id="exportBtn" class="success">导出 Excel</button>
        <button type="button" id="clearBtn" class="danger">清空全部</button>
      </div>
    </div>

    <div class="summary" id="summary">共 0 条记录</div>
    <div class="stats" id="stats"></div>
    <div class="reports" id="reports"></div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>转账银行卡号码</th>
          <th>卡名称</th>
          <th>业务板块</th>
          <th>转入银行卡卡号</th>
          <th>卡收款人名称</th>
          <th>卡用途</th>
          <th>收支用途</th>
          <th>收支类型</th>
          <th>金额 (<span id="currencyLabel">¥</span>)</th>
          <th>对账状态</th>
          <th>备注</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="recordsBody"></tbody>
    </table>
    </div>

    <div id="ledgerPage" class="page" style="display:none;">
      <div class="ledger-container">
        <div class="ledger-summary" id="ledgerSummary"></div>
        <div id="ledgerDetails"></div>
      </div>
    </div>

    <div id="reconcilePage" class="page" style="display:none;">
      <p>对账管理页面</p>
    </div>
    </div>
  </div>

  <script src="a.js"></script>
</body>
</html>
